<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自転車店ホームページ</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, "Noto Sans JP", sans-serif;
      color: #222;
      background: #f5f5f5;
    }

    header {
      padding: 50px 20px;
      text-align: center;
      color: white;
      background: #185f8d;
    }

    main {
      max-width: 900px;
      margin: 30px auto;
      padding: 0 20px;
    }

    section {
      margin-bottom: 24px;
      padding: 24px;
      background: white;
      border-radius: 10px;
    }

    h1 {
      margin: 0 0 12px;
    }

    h2 {
      color: #185f8d;
    }

    .button {
      display: inline-block;
      margin-top: 10px;
      padding: 12px 20px;
      color: white;
      text-decoration: none;
      background: #185f8d;
      border-radius: 6px;
    }

    footer {
      padding: 20px;
      text-align: center;
      color: white;
      background: #333;
    }
  </style>
</head>

<body>
  <header>
    <h1>〇〇自転車店</h1>
    <p>地域の自転車販売・修理を承ります</p>
  </header>

  <main>
    <section>
      <h2>当店について</h2>
      <p>
        自転車の販売、パンク修理、タイヤ交換、出張修理などに対応しています。
      </p>
    </section>

    <section>
      <h2>主なサービス</h2>
      <ul>
        <li>パンク修理</li>
        <li>タイヤ・チューブ交換</li>
        <li>ブレーキ調整</li>
        <li>自転車販売</li>
        <li>出張修理</li>
      </ul>
    </section>

    <section>
      <h2>営業時間</h2>
      <p>営業時間：9:00～18:00</p>
      <p>定休日：〇曜日</p>
    </section>

    <section>
      <h2>お問い合わせ</h2>
      <p>修理や在庫について、お電話でお問い合わせください。</p>
      <a class="button" href="tel:0000000000">電話する</a>
    </section>
  </main>

  <footer>
    <p>© 2026 〇〇自転車店</p>
  </footer>
</body>
</html>
